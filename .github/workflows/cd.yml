#Llevo 3 intentos y por algun potivo esta onda no ejecuta ningun test con los push .__.
#y eso que los docs del repo son exactamente iguales a lo que tiene la guia...
name: Deploy on Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build n push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/buhosapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/buhosapp:${{ github.sha }}